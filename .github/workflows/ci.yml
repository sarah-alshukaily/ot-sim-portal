# OT SIM Portal — CI/CD Pipeline
# This file runs automatically when code is pushed to GitHub

name: OT SIM Portal CI

# WHEN does the pipeline run?
on:
  push:
    branches:
      - main
      - feature/*
  pull_request:
    branches:
      - main

# WHAT does the pipeline do?
jobs:
  test:
    name: Run Phone Validation Tests
    runs-on: ubuntu-latest

    steps:
      # Step 1: Download the code from GitHub
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2: Install Node.js so we can run test.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      # Step 3: Run the phone validation tests
      - name: Run phone validation tests
        run: node test.js

      # Step 4: Confirm completion
      - name: Pipeline complete
        run: echo "All tests passed — SIM portal phone validation verified"
``